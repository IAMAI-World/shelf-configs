spring.servlet.multipart.max-file-size: 1000MB
spring.servlet.multipart.max-request-size: 1000MB
spring.cloud.gateway.httpclient.codec.multipart.enabled: true
spring.cloud.gateway.httpclient.max-request-size: 1000MB
spring.jpa.properties.hibernate.order_by.default_null_ordering: last
server:
  forward-headers-strategy: framework
spring:
  main:
    allow-bean-definition-overriding: true
  data.rest.base-path: api/v1
  datasource:
    url: jdbc:postgresql://localhost:5432/shelf-product?ssl=false
    username: user
    password: password
  jpa:
    properties:
      hibernate:
        generate_statistics: true
        cache:
          use_second_level_cache: true
          region.factory_class: org.hibernate.cache.ehcache.EhCacheRegionFactory
          queries: true
          ehcache:
            missing_cache_strategy: create
        jdbc:
          batch_size: 50
        default_batch_fetch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQL9Dialect
    show-sql: true
    hibernate:
      ddl-auto: update
      naming-strategy: org.hibernate.cfg.ImprovedNamingStrategy
  cloud:
    gateway:
      httpclient:
        codec:
          multipart:
            enabled: true
management:
  endpoints:
    web:
      exposure:
        include: '*'
  health:
    mail:
      enabled: false
springdoc.api-docs.path: /api/v1/profiles/api-doc
logging:
  level:
    com.agenatech: DEBUG
health:
  config:
    enabled: false

